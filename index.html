<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ.REQUEST — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black:#0a0a0a; --white:#f0ede8; --accent:#ff3b00; --accent2:#ffcc00; --gray:#1a1a1a; --gray2:#2a2a2a; --muted:#555; }
    body { background:var(--black); color:var(--white); font-family:'Space Mono',monospace; min-height:100vh; padding:40px 20px; }
    .container { max-width:600px; margin:0 auto; }
    .logo { font-family:'Bebas Neue',sans-serif; font-size:64px; letter-spacing:4px; line-height:1; }
    .logo span { color:var(--accent); }
    .tagline { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-top:4px; }
    header { margin-bottom:40px; }
    .user-bar { display:flex; align-items:center; gap:12px; margin-top:20px; padding:12px 16px; background:var(--gray); border-radius:4px; border:1px solid var(--gray2); }
    .user-avatar { width:32px; height:32px; border-radius:50%; background:var(--gray2); object-fit:cover; }
    .user-name { font-size:12px; flex:1; }
    .btn-logout { font-size:10px; color:var(--muted); background:none; border:none; cursor:pointer; font-family:'Space Mono',monospace; }
    .btn-logout:hover { color:var(--white); }
    .section-title { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:16px; }
    .btn-new { width:100%; background:var(--accent); color:var(--white); border:none; border-radius:4px; padding:18px; font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; cursor:pointer; margin-bottom:32px; }
    .btn-new:hover { background:#e03300; }
    .event-card { background:var(--gray); border:1px solid var(--gray2); border-radius:4px; padding:20px; margin-bottom:12px; }
    .event-name { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:2px; }
    .event-date { font-size:10px; color:var(--muted); margin-top:2px; }
    .event-playlist { font-size:11px; color:#1DB954; margin-top:4px; }
    .event-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
    .btn-sm { font-family:'Space Mono',monospace; font-size:11px; padding:8px 14px; border-radius:3px; cursor:pointer; border:1px solid var(--gray2); background:transparent; color:var(--white); }
    .btn-sm:hover { border-color:var(--white); }
    .btn-sm.accent { background:var(--accent2); color:var(--black); border-color:var(--accent2); font-weight:700; }
    .btn-sm.danger { color:#ff6b6b; }
    .btn-sm.danger:hover { border-color:#ff6b6b; }
    .qr-area { display:none; margin-top:14px; padding:16px; background:white; border-radius:4px; text-align:center; }
    .event-url { font-size:10px; color:#333; word-break:break-all; margin-top:8px; }
    .requests-area { margin-top:14px; display:none; }
    .request-item { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--black); border-radius:3px; margin-bottom:6px; }
    .request-img { width:36px; height:36px; border-radius:2px; object-fit:cover; background:var(--gray2); flex-shrink:0; }
    .request-info { flex:1; min-width:0; }
    .request-title { font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .request-artist { font-size:10px; color:var(--muted); margin-top:2px; }
    .btn-add { background:#1DB954; color:#000; border:none; border-radius:3px; padding:6px 12px; font-family:'Space Mono',monospace; font-size:10px; font-weight:700; cursor:pointer; flex-shrink:0; }
    .btn-add:disabled { background:#333; color:#666; cursor:default; }
    .btn-dismiss { background:transparent; border:1px solid var(--gray2); color:var(--muted); border-radius:3px; padding:6px 10px; font-family:'Space Mono',monospace; font-size:10px; cursor:pointer; flex-shrink:0; }
    .no-requests { font-size:11px; color:var(--muted); padding:12px; text-align:center; }
    .badge { display:inline-block; background:var(--accent); color:white; border-radius:10px; font-size:10px; padding:2px 7px; margin-left:6px; vertical-align:middle; }
    .empty { text-align:center; padding:60px 20px; color:var(--muted); font-size:13px; line-height:1.8; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; display:none; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--gray); border:1px solid var(--gray2); border-radius:6px; padding:32px; width:100%; max-width:440px; max-height:90vh; overflow-y:auto; }
    .modal-title { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:2px; margin-bottom:24px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    .field input { width:100%; background:var(--black); border:1px solid var(--gray2); border-radius:4px; padding:12px 14px; font-family:'Space Mono',monospace; font-size:13px; color:var(--white); outline:none; }
    .field input:focus { border-color:var(--accent); }
    .playlist-results { background:var(--black); border:1px solid var(--gray2); border-radius:4px; margin-top:6px; overflow:hidden; display:none; max-height:200px; overflow-y:auto; }
    .pl-item { display:flex; align-items:center; gap:10px; padding:10px 12px; cursor:pointer; border-bottom:1px solid var(--gray2); transition:background 0.15s; }
    .pl-item:last-child { border-bottom:none; }
    .pl-item:hover { background:var(--gray2); }
    .pl-img { width:36px; height:36px; border-radius:2px; object-fit:cover; background:var(--gray2); flex-shrink:0; }
    .pl-name { font-size:12px; font-weight:700; }
    .pl-count { font-size:10px; color:var(--muted); margin-top:2px; }
    .pl-selected { background:rgba(29,185,84,0.1); border:1px solid rgba(29,185,84,0.4); border-radius:4px; padding:10px 12px; margin-top:6px; display:none; align-items:center; gap:10px; }
    .pl-selected img { width:36px; height:36px; border-radius:2px; }
    .pl-selected-name { font-size:12px; font-weight:700; color:#1DB954; }
    .pl-selected-count { font-size:10px; color:var(--muted); margin-top:2px; }
    .modal-actions { display:flex; gap:10px; margin-top:24px; }
    .btn-create { flex:1; background:var(--accent); color:var(--white); border:none; border-radius:4px; padding:14px; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; cursor:pointer; }
    .btn-cancel { background:transparent; border:1px solid var(--gray2); color:var(--muted); border-radius:4px; padding:14px 20px; font-family:'Space Mono',monospace; font-size:12px; cursor:pointer; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.2); border-top-color:white; border-radius:50%; animation:spin 0.6s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .btn-auth { background:#1DB954; color:var(--black); border:none; border-radius:4px; padding:18px 40px; font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; cursor:pointer; }
    #authScreen { text-align:center; padding:80px 20px; }
    #authScreen p { font-size:12px; color:var(--muted); line-height:1.9; margin-bottom:32px; }
    .pw-screen { text-align:center; padding:80px 20px; }
    .pw-screen input { background:var(--gray); border:1px solid var(--gray2); border-radius:4px; padding:12px 16px; font-family:'Space Mono',monospace; font-size:14px; color:var(--white); outline:none; width:100%; max-width:280px; margin-bottom:16px; text-align:center; letter-spacing:4px; }
    .pw-screen input:focus { border-color:var(--accent); }
    .pw-btn { background:var(--accent); color:white; border:none; border-radius:4px; padding:14px 32px; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; cursor:pointer; }
    .pw-error { color:var(--accent); font-size:11px; margin-top:8px; display:none; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">DJ<span>.</span>REQUEST</div>
    <p class="tagline">Gestion des événements</p>
  </header>

  <div id="pwScreen" class="pw-screen" style="display:none">
    <p style="font-size:12px;color:var(--muted);margin-bottom:24px">Accès DJ requis</p>
    <div><input type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPw()"></div>
    <button class="pw-btn" onclick="checkPw()">Entrer</button>
    <p class="pw-error" id="pwError">Mot de passe incorrect</p>
  </div>

  <div id="authScreen" style="display:none">
    <p>Connecte ton compte Spotify<br>pour gérer tes événements.</p>
    <button class="btn-auth" onclick="startAuth()">🎵 Connecter Spotify</button>
  </div>

  <div id="dashboard" style="display:none">
    <div class="user-bar">
      <img id="userAvatar" class="user-avatar" src="" alt="">
      <span class="user-name" id="userName"></span>
      <button class="btn-logout" onclick="logout()">Déconnecter</button>
    </div>
    <div style="margin-top:32px;margin-bottom:8px" class="section-title">Tes événements</div>
    <button class="btn-new" onclick="openModal()">+ Nouvel événement</button>
    <div id="eventsList"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Nouvel événement</div>
    <div class="field"><label>Nom de l'événement</label><input type="text" id="eventName" placeholder="ex: Mariage Tremblay"></div>
    <div class="field"><label>Date</label><input type="date" id="eventDate"></div>
    <div class="field">
      <label>Playlist Spotify</label>
      <input type="text" id="plSearch" placeholder="Chercher une playlist..." autocomplete="off" oninput="searchPlaylists(this.value)">
      <div class="playlist-results" id="plResults"></div>
      <div class="pl-selected" id="plSelected">
        <img id="plSelectedImg" src="" alt="">
        <div>
          <div class="pl-selected-name" id="plSelectedName"></div>
          <div class="pl-selected-count" id="plSelectedCount"></div>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-create" id="btnCreate" onclick="creerEvenement()">Créer</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  const CLIENT_ID='9c193b00efa34abeaae796b7d87bb007';
  const REDIRECT_URI='https://mathieudesaulniers-creator.github.io/dj-requests/callback.html';
  const BASE_URL='https://mathieudesaulniers-creator.github.io/dj-requests/event.html';
  const JSONBIN_KEY='$2a$10$UQotBJWZnI0qYxpUCoGcEu6CTp3GY0u2a7dQWZ1OtMfZpK3AWMl2a';
  const JSONBIN_BIN='69a707f943b1c97be9afa9f1';
  const TOKEN_KEY='djreq_token', EXPIRY_KEY='djreq_expiry', USER_KEY='djreq_user';
  const DJ_PASSWORD='dj2026';
  const PW_KEY='djreq_pw';
  let token=null, events=[], allPlaylists=[], selectedPlaylist=null, plSearchTimeout=null;

  function getToken(){ const e=localStorage.getItem(EXPIRY_KEY); return(e&&Date.now()<parseInt(e))?localStorage.getItem(TOKEN_KEY):null; }

  function checkPw(){
    const val=document.getElementById('pwInput').value;
    if(val===DJ_PASSWORD){ sessionStorage.setItem(PW_KEY,'ok'); document.getElementById('pwScreen').style.display='none'; checkAuth(); }
    else { document.getElementById('pwError').style.display='block'; }
  }

  function generateVerifier(){ const a=new Uint8Array(32); crypto.getRandomValues(a); return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); }
  async function generateChallenge(v){ const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v)); return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); }

  async function startAuth(){
    const v=generateVerifier(); const c=await generateChallenge(v);
    sessionStorage.setItem('pkce_verifier',v);
    const s='playlist-modify-public playlist-modify-private playlist-read-private playlist-read-collaborative';
    window.location.href=`https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=code&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(s)}&code_challenge_method=S256&code_challenge=${c}`;
  }

  function logout(){ [TOKEN_KEY,EXPIRY_KEY,USER_KEY].forEach(k=>localStorage.removeItem(k)); location.reload(); }

  async function loadData(){
    const res=await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}/latest`,{headers:{'X-Master-Key':JSONBIN_KEY}});
    const data=await res.json(); return data.record;
  }

  async function saveData(record){
    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},body:JSON.stringify(record)});
  }

  async function checkAuth(){
    token=getToken();
    if(!token){ document.getElementById('authScreen').style.display='block'; return; }
    const record=await loadData();
    record.searchToken=token;
    record.searchTokenExpiry=localStorage.getItem(EXPIRY_KEY);
    await saveData(record);
    document.getElementById('authScreen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    let user=JSON.parse(localStorage.getItem(USER_KEY)||'null');
    if(!user){ const r=await fetch('https://api.spotify.com/v1/me',{headers:{'Authorization':'Bearer '+token}}); user=await r.json(); localStorage.setItem(USER_KEY,JSON.stringify(user)); }
    document.getElementById('userName').textContent=user.display_name||user.id;
    if(user.images&&user.images[0]) document.getElementById('userAvatar').src=user.images[0].url;
    // Load all playlists
    const plRes=await fetch('https://api.spotify.com/v1/me/playlists?limit=50',{headers:{'Authorization':'Bearer '+token}});
    const plData=await plRes.json();
    allPlaylists=plData.items||[];
    events=record.events||[];
    renderEvents(record);
  }

  async function init(){
    if(!sessionStorage.getItem(PW_KEY)){ document.getElementById('pwScreen').style.display='block'; return; }
    checkAuth();
  }

  function searchPlaylists(q){
    clearTimeout(plSearchTimeout);
    const el=document.getElementById('plResults');
    if(!q.trim()){ el.style.display='none'; return; }
    plSearchTimeout=setTimeout(()=>{
      const filtered=allPlaylists.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
      if(!filtered.length){ el.style.display='none'; return; }
      el.style.display='block';
      el.innerHTML=filtered.map(p=>`
        <div class="pl-item" onclick="selectPlaylist('${p.id}','${esc(p.name)}',${p.tracks.total},'${p.images&&p.images[0]?p.images[0].url:''}','${p.external_urls?.spotify||''}')">
          ${p.images&&p.images[0]?`<img class="pl-img" src="${p.images[0].url}">`:'<div class="pl-img"></div>'}
          <div><div class="pl-name">${p.name}</div><div class="pl-count">${p.tracks.total} chansons</div></div>
        </div>`).join('');
    },300);
  }

  function selectPlaylist(id,name,count,img,url){
    selectedPlaylist={id,name,count,img,url};
    document.getElementById('plResults').style.display='none';
    document.getElementById('plSearch').value=name;
    document.getElementById('plSelectedImg').src=img;
    document.getElementById('plSelectedName').textContent=name;
    document.getElementById('plSelectedCount').textContent=count+' chansons';
    document.getElementById('plSelected').style.display='flex';
  }

  function esc(s){ return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

  function renderEvents(record){
    const c=document.getElementById('eventsList');
    if(!events.length){ c.innerHTML='<div class="empty">🎧<br><br>Aucun événement.<br>Crée ton premier événement ci-dessus !</div>'; return; }
    c.innerHTML=events.map((ev,i)=>{
      const reqs=(record&&record.requests)?record.requests.filter(r=>r.eventCode===ev.code&&r.status==='pending'):[];
      return `
      <div class="event-card">
        <div class="event-name">${ev.name}</div>
        ${ev.date?`<div class="event-date">${formatDate(ev.date)}</div>`:''}
        <div class="event-playlist">🎵 ${ev.playlistName}</div>
        <div class="event-actions">
          <button class="btn-sm accent" onclick="showQR(${i})">📱 QR Code</button>
          <button class="btn-sm" onclick="copyLink(${i})">🔗 Copier lien</button>
          <button class="btn-sm" onclick="openSpotify(${i})">▶ Playlist</button>
          <button class="btn-sm" onclick="toggleRequests(${i})">🎵 Demandes${reqs.length?`<span class="badge">${reqs.length}</span>`:''}</button>
          <button class="btn-sm danger" onclick="supprimerEvenement(${i})">Supprimer</button>
        </div>
        <div class="qr-area" id="qr-${i}">
          <div id="qrcode-${i}"></div>
          <div class="event-url">${BASE_URL}?event=${ev.code}</div>
        </div>
        <div class="requests-area" id="req-${i}">
          ${reqs.length?reqs.map(r=>`
            <div class="request-item" id="reqitem-${r.id}">
              <img class="request-img" src="${r.img||''}" alt="">
              <div class="request-info">
                <div class="request-title">${r.title}</div>
                <div class="request-artist">${r.artist}</div>
              </div>
              <button class="btn-add" onclick="addToPlaylist('${r.id}','${r.uri}','${ev.playlistId}')">+ Spotify</button>
              <button class="btn-dismiss" onclick="dismissRequest('${r.id}')">✕</button>
            </div>`).join('')
          :'<div class="no-requests">Aucune demande pour l\'instant</div>'}
        </div>
      </div>`;
    }).join('');
  }

  function toggleRequests(i){ const el=document.getElementById('req-'+i); el.style.display=el.style.display==='block'?'none':'block'; }

  async function addToPlaylist(reqId,uri,playlistId){
    const btn=document.querySelector(`#reqitem-${reqId} .btn-add`);
    btn.disabled=true; btn.textContent='...';
    try{
      const res=await fetch(`https://api.spotify.com/v1/playlists/${playlistId}/tracks`,{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({uris:[uri]})});
      if(!res.ok) throw new Error('Spotify error');
      await dismissRequest(reqId);
    }catch(e){ btn.disabled=false; btn.textContent='+ Spotify'; alert('Erreur Spotify'); }
  }

  async function dismissRequest(reqId){
    const record=await loadData();
    record.requests=(record.requests||[]).filter(r=>r.id!==reqId);
    await saveData(record);
    events=record.events||[];
    renderEvents(record);
  }

  function formatDate(d){ const [y,m,day]=d.split('-'); const mo=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc']; return `${parseInt(day)} ${mo[parseInt(m)-1]} ${y}`; }

  function openModal(){
    selectedPlaylist=null;
    document.getElementById('plSelected').style.display='none';
    document.getElementById('plSearch').value='';
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('eventDate').value=new Date().toISOString().split('T')[0];
    setTimeout(()=>document.getElementById('eventName').focus(),100);
  }

  function closeModal(){
    document.getElementById('modalOverlay').classList.remove('open');
    ['eventName'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('btnCreate').innerHTML='Créer';
    document.getElementById('btnCreate').disabled=false;
    selectedPlaylist=null;
  }

  async function creerEvenement(){
    const name=document.getElementById('eventName').value.trim();
    const date=document.getElementById('eventDate').value;
    if(!name){ document.getElementById('eventName').focus(); return; }
    if(!selectedPlaylist){ alert('Choisis une playlist Spotify !'); return; }
    const btn=document.getElementById('btnCreate');
    btn.innerHTML='<span class="spinner"></span>Création...'; btn.disabled=true;
    try{
      const code=Math.random().toString(36).substring(2,8).toUpperCase();
      const record=await loadData();
      record.events=record.events||[];
      record.events.unshift({name,date,playlistName:selectedPlaylist.name,playlistId:selectedPlaylist.id,playlistUrl:selectedPlaylist.url,code,createdAt:Date.now()});
      await saveData(record);
      events=record.events;
      closeModal(); renderEvents(record);
    }catch(e){ alert('Erreur. Réessaie.'); btn.innerHTML='Créer'; btn.disabled=false; }
  }

  function showQR(i){
    const el=document.getElementById('qr-'+i);
    const visible=el.style.display==='block';
    el.style.display=visible?'none':'block';
    if(!visible&&!document.getElementById('qrcode-'+i).innerHTML){
      new QRCode(document.getElementById('qrcode-'+i),{text:BASE_URL+'?event='+events[i].code,width:200,height:200,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H});
    }
  }

  function copyLink(i){ const url=BASE_URL+'?event='+events[i].code; navigator.clipboard.writeText(url).then(()=>alert('Lien copié !\n'+url)); }
  function openSpotify(i){ if(events[i].playlistUrl) window.open(events[i].playlistUrl,'_blank'); }
  async function supprimerEvenement(i){ if(!confirm('Supprimer cet événement ?')) return; const record=await loadData(); record.events.splice(i,1); await saveData(record); events=record.events; renderEvents(record); }

  init();
</script>
</body>
</html>
